<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meritíssimo - Jogo de Simulação Jurídica</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f8fafc;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .icon {
      font-size: 3.5em;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 2em;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f8fafc;
    }
    .accent {
      color: #f59e0b;
    }
    .tagline {
      font-size: 1.05em;
      color: #94a3b8;
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 48px;
    }
    .links a {
      display: block;
      padding: 14px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      font-size: 1em;
      transition: all 0.2s ease;
    }
    .link-primary {
      background: #f59e0b;
      color: #0f172a;
    }
    .link-primary:hover {
      background: #fbbf24;
    }
    .link-secondary {
      background: rgba(248, 250, 252, 0.08);
      color: #f8fafc;
      border: 1px solid rgba(248, 250, 252, 0.12);
    }
    .link-secondary:hover {
      background: rgba(248, 250, 252, 0.14);
    }
    .footer {
      color: #475569;
      font-size: 0.85em;
      line-height: 1.6;
    }
    .footer a {
      color: #64748b;
      text-decoration: none;
    }
    .footer a:hover {
      color: #94a3b8;
      text-decoration: underline;
    }
    @media (max-width: 480px) {
      h1 { font-size: 1.6em; }
      .icon { font-size: 2.8em; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="icon">&#9878;</div>
  <h1>Meritíssimo</h1>
  <p class="tagline">Jogo de simulação jurídica colaborativo.<br>Assuma papéis, analise evidências e decida veredictos.</p>

  <div class="links">
    <a href="politica-de-privacidade.html" class="link-primary">Política de Privacidade</a>
    <a href="termos-de-uso.html" class="link-secondary">Termos de Uso</a>
  </div>

  <div class="footer">
    <p>&copy; 2026 Meritíssimo Ltda</p>
    <p><a href="mailto:meritissimo.app@gmail.com">meritissimo.app@gmail.com</a></p>
  </div>
</div>

</body>
</html>
